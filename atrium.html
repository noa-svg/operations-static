<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Operate · Legacy Value Partners</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='6' fill='%231F5DB0'/%3E%3Ctext x='50%25' y='62%25' dominant-baseline='central' text-anchor='middle' font-family='Helvetica,Arial,sans-serif' font-weight='800' font-size='34' fill='%23FFF'%3EL%3C/text%3E%3C/svg%3E">
  <!--
    shell-static.html -- the operate.legacyvpartners.com counterpart of
    shell.html (2026-07-13 migration). shell.html itself is NEVER touched:
    it keeps serving the original GAS-templated AtriumX.html deployment
    unchanged, the required rollback path. This is a SEPARATE template for
    the external static host, built by buildStaticShell() in
    build-atrium.mjs, not buildShell().

    Everything shell.html's four GAS scriptlets did server-side per request
    (__dateStr, initialMe, initialBuildTag, initialBoot) has to happen a
    different way here, since there is no server-side template evaluation
    on a static host:
      - dateStr: computed client-side below (Asia/Jerusalem, matching the
        original server computation).
      - buildTag: baked in at BUILD TIME by buildStaticShell() (same
        content-hash substitution mechanism as the JS/CSS URLs below).
      - initialMe: no longer server-injected. Set client-side after sign-in
        from the verified Google ID token's email claim.
      - BOOT: no longer server-injected per-request (there is no
        per-request compute step). Seeded synchronously from a localStorage
        cache of the last successful boot payload if one exists (instant
        paint, matching the original zero-RPC cold-paint guarantee even
        though the DATA may be a few minutes stale), then reconciled with a
        fresh fetch right after sign-in. See src/store/store.js's
        BOOT_CACHE_KEY handling and App.js's bootAtriumX(). A first-ever
        visit with no cache yet falls back to BOOT = null, same as the
        app's existing null-safe empty-state rendering already handles.
  -->
  <link rel="stylesheet" href="assets/AtriumX.92a293e921.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* Sign-in gate only -- kept intentionally separate from AtriumX's own
       interior styles (the proven, reviewed visual system stays untouched;
       see the plan's "mature Operate rethink" section on why the interior
       is not being re-skinned). This is threshold-only chrome. */
    #atrium-gate {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: #F2EDE0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }
    /* Tel Aviv skyline, doodled -- Azrieli's three towers, Moshe Aviv, a
       crane (there's always a crane). Pure line art, no fill: the feTurbulence
       + feDisplacementMap filter below adds a single continuous hand-wobble
       across the whole group, like it was drawn once in one unsteady pass
       rather than traced clean and distorted per-shape. Sits behind the card,
       anchored to the bottom edge, low-contrast so it reads as paper texture
       first and skyline second.
       2026-07-14 v2: Noa sent a real reference (a Tel Aviv storefront window,
       thick-marker doodles on glass -- wine bottles, glasses, a piano, dense
       scrawled scribble texture filling the gaps, occasional solid-black
       fills for graphic punch). The first pass read as too clean/CAD-like
       next to that. Thickened the line, pushed the wobble rawer, added a
       few solid-black accents and scribble-texture clusters in the sky --
       same technique, more marker, less ruler. */
    #atrium-gate-skyline {
      position: absolute; left: 0; right: 0; bottom: 0; width: 100%;
      height: 34vh; min-height: 220px; max-height: 340px;
      z-index: 1; pointer-events: none;
    }
    #atrium-gate-skyline svg { width: 100%; height: 100%; display: block; }
    #atrium-gate-skyline .bld {
      fill: none; stroke: #4A4438; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
      filter: url(#atrium-sketch);
    }
    #atrium-gate-skyline .bld--soft { stroke-width: 2.2; opacity: 0.6; }
    #atrium-gate-skyline .bld--fill { fill: #4A4438; stroke: none; }
    #atrium-gate-skyline .bld--scribble {
      fill: none; stroke: #4A4438; stroke-width: 2; opacity: 0.4;
      stroke-linecap: round; stroke-linejoin: round;
      filter: url(#atrium-sketch);
    }
    #atrium-gate .card {
      position: relative; z-index: 2;
      background: #fff; border: 1px solid rgba(20,20,20,0.16); border-radius: 12px;
      padding: 32px 28px; max-width: 360px; width: 100%; text-align: center;
      box-shadow: 0 8px 24px rgba(20,20,20,.08);
    }
    #atrium-gate h1 { font-size: 17px; font-weight: 700; margin: 0 0 4px; color: #141414; }
    #atrium-gate p { font-size: 13px; color: #6D6657; margin: 0 0 20px; }
    #atrium-gate-signin { display: flex; justify-content: center; min-height: 40px; }
    #atrium-gate-error {
      color: #D85E4C; font-size: 13px; font-weight: 600; margin-top: 12px; display: none;
    }
  </style>
</head>
<body>

  <!-- Sign-in gate. Hidden immediately once a cached or fresh token is
       confirmed valid (App.js's bootAtriumX()). This is a UX gate, not the
       real security boundary -- RpcGate.gs's verifyIdToken_ is the actual
       enforcement, same principle as the ju-cayman console pattern. -->
  <div id="atrium-gate">
    <div id="atrium-gate-skyline" aria-hidden="true">
      <svg viewBox="0 0 1600 300" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- One continuous wobble applied to every path -- a doodle drawn
               in a single unsteady pass, not clean shapes with noise added
               per-element (that reads as "distorted", not "hand-drawn"). -->
          <filter id="atrium-sketch" x="-8%" y="-8%" width="116%" height="116%">
            <feTurbulence type="fractalNoise" baseFrequency="0.017 0.024" numOctaves="2" seed="7" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>

             (Azrieli x3 + Moshe Aviv) is centered in the viewBox via the
             translate(450,0) group below, so it survives cropping on a

             lose on a narrow viewport. -->

        <path class="bld" d="M55,280 L55,155 L100,155 L100,280"/>
        <path class="bld bld--soft" d="M63,167 L63,268 M75,167 L75,268 M87,167 L87,268"/>
        <path class="bld bld--soft" d="M115,280 L115,210 L150,210 L150,280"/>
        <path class="bld" d="M165,280 L165,175 L210,175 L210,280"/>

        <path class="bld" d="M280,280 L280,145 L295,145 L295,125 L325,125 L325,280"/>
        <path class="bld bld--soft" d="M340,280 L340,200 L380,200 L380,280"/>
        <path class="bld bld--soft" d="M348,212 L348,268 M362,212 L362,268 M372,212 L372,268"/>
        <path class="bld" d="M400,280 L400,165 L440,165 L440,280"/>
        <path class="bld bld--soft" d="M408,177 L408,268 M420,177 L420,268 M430,177 L430,268"/>
        <path class="bld bld--soft" d="M460,280 L460,230 L495,230 L495,280"/>
        <path class="bld" d="M515,280 L515,190 L555,190 L555,280"/>
        <path class="bld bld--soft" d="M523,202 L523,268 M535,202 L535,268 M547,202 L547,268"/>

      <g transform="translate(450,0)">
        <path class="bld" d="M110,280 L110,140 L165,140 L165,280"/>
        <path class="bld bld--soft" d="M118,150 L118,270 M132,150 L132,270 M146,150 L146,270 M110,165 L165,165 M110,195 L165,195 M110,225 L165,225 M110,255 L165,255"/>

        <!-- Azrieli Round Tower -- cap filled solid, graphic punch like the
             reference's solid-black wine glasses. -->
        <path class="bld" d="M195,280 C186,220 186,120 200,75 C206,58 224,58 230,75 C244,120 244,220 235,280"/>
        <ellipse class="bld bld--fill" cx="215" cy="72" rx="16" ry="6" filter="url(#atrium-sketch)"/>

        <!-- Azrieli Square Tower -- two lit windows filled solid, same
             graphic-punch move as the round tower's cap. -->
        <path class="bld" d="M280,280 L280,100 L350,100 L350,280"/>
        <path class="bld bld--soft" d="M292,112 L292,268 M304,112 L304,268 M316,112 L316,268 M328,112 L328,268 M338,112 L338,268"/>
        <path class="bld bld--soft" d="M280,135 L350,135 M280,165 L350,165 M280,195 L350,195 M280,225 L350,225 M280,255 L350,255"/>
        <rect class="bld bld--fill" x="305" y="138" width="10" height="12" filter="url(#atrium-sketch)"/>
        <rect class="bld bld--fill" x="317" y="198" width="10" height="12" filter="url(#atrium-sketch)"/>

        <!-- Azrieli Triangular Tower -->
        <path class="bld" d="M365,280 L365,120 L410,68 L455,120 L455,280"/>
        <path class="bld bld--soft" d="M375,270 L400,150 M445,270 L420,150 M383,150 L437,150 M390,190 L430,190 M394,225 L426,225"/>

        <!-- low gap filler -->
        <path class="bld bld--soft" d="M470,280 L470,205 L520,205 L520,280"/>

        <!-- Moshe Aviv Tower (tallest, tapered, antenna) -->
        <path class="bld" d="M545,280 L552,90 L560,55 L568,90 L575,280"/>
        <path class="bld" d="M560,55 L560,20"/>
        <path class="bld bld--soft" d="M552,110 L568,110 M551,150 L569,150 M550,190 L570,190 M549,230 L571,230"/>

        <!-- Sky scribble-texture, echoing the reference's dense scrawled
             negative-space fill. Loose scratchy loops, not literal text --
             a few small clusters, not everywhere (S1 reduction still
             applies; this is texture, not the point). -->
        <path class="bld--scribble" d="M420,35 q6,-8 12,0 q6,8 12,0 q6,-8 12,0 q4,6 10,2"/>
        <path class="bld--scribble" d="M615,40 q5,-7 10,0 t10,0 q5,-7 10,1"/>
        <path class="bld--scribble" d="M480,20 q4,8 -2,10 q6,2 4,10 q-6,0 -4,-8"/>

        <!-- mid-rise with a crane, because there is always a crane -->
        <path class="bld bld--soft" d="M600,280 L600,170 L655,170 L655,280"/>
        <path class="bld" d="M615,170 L615,95 M615,100 L672,88 M655,108 L661,120 L649,120 Z M672,88 L672,100"/>

        <!-- HaShalom-ish tower with a setback notch -->
        <path class="bld" d="M700,280 L700,135 L722,135 L722,118 L752,118 L752,280"/>
        <path class="bld bld--soft" d="M700,160 L752,160 M700,190 L752,190 M700,220 L752,220 M700,250 L752,250"/>

        <!-- right-hand skyline: varied low/mid rises, filling the width -->
        <path class="bld bld--soft" d="M775,280 L775,230 L815,230 L815,280"/>
        <path class="bld" d="M830,280 L830,195 L880,195 L880,280"/>
        <path class="bld bld--soft" d="M838,207 L838,270 M852,207 L852,270 M866,207 L866,270"/>
        <path class="bld bld--soft" d="M895,280 L895,245 L925,245 L925,280"/>

        <path class="bld bld--soft" d="M1005,280 L1005,220 L1045,220 L1045,280"/>
        <path class="bld" d="M1065,280 L1065,140 L1080,140 L1080,120 L1110,120 L1110,280"/>
        <path class="bld bld--soft" d="M1125,280 L1125,235 L1160,235 L1160,280"/>
        <path class="bld" d="M1180,280 L1180,180 L1225,180 L1225,280"/>
        <path class="bld bld--soft" d="M1188,192 L1188,268 M1202,192 L1202,268 M1214,192 L1214,268"/>
        <path class="bld bld--soft" d="M1245,280 L1245,250 L1270,250 L1270,280"/>
        <path class="bld" d="M1290,280 L1290,155 L1300,140 L1310,155 L1310,280"/>
        <path class="bld bld--soft" d="M1330,280 L1330,210 L1370,210 L1370,280"/>
        <path class="bld" d="M1390,280 L1390,175 L1435,175 L1435,280"/>
        <path class="bld bld--soft" d="M1398,187 L1398,268 M1412,187 L1412,268 M1424,187 L1424,268"/>
        <path class="bld bld--soft" d="M1455,280 L1455,240 L1490,240 L1490,280"/>
        <path class="bld" d="M1510,280 L1510,200 L1550,200 L1550,280"/>
        <path class="bld bld--soft" d="M1518,212 L1518,268 M1532,212 L1532,268 M1542,212 L1542,268"/>
      </g>

        <!-- ground line -->
        <path class="bld bld--soft" d="M0,280 L1600,280"/>
      </svg>
    </div>
    <div class="card">
      <h1>Sign in to continue</h1>
      <p>Sign in with your legacyvpartners.com Google account.</p>
      <div id="atrium-gate-signin"></div>
      <div id="atrium-gate-error">That account isn't on legacyvpartners.com. Sign in with your Legacy Google account.</div>
    </div>
  </div>

  <!-- Mount point. App.js renders the .page wrapper (Masthead + StatusStrip)
       into this node; the shell stays a thin host. Hidden until sign-in
       resolves so the interior never renders against an unauthenticated
       fetch (App.js toggles this, not CSS, so there's one source of truth
       for gate-vs-app visibility). -->
  <div id="atrium-root" style="display:none"></div>

  <!-- Toast surfaces (parity with shell.html). -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

  <script>
    (function () {
      var weekdays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      // Asia/Jerusalem, matching the original server-side computation
      // (appsscript.json's timeZone) even though this now runs client-side.
      var parts = new Intl.DateTimeFormat('en-US', {
        timeZone: 'Asia/Jerusalem', weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      }).formatToParts(new Date());
      var byType = {};
      parts.forEach(function (p) { byType[p.type] = p.value; });
      window.__dateStr = byType.weekday + ' · ' + byType.day + ' ' + byType.month + ' ' + byType.year;

      window.__buildTag = 'v223.3';
      window.__initialMe = ''; // set post-sign-in, see App.js's bootAtriumX()

      // BOOT: seed from the last-known cache so cold paint stays instant even
      // though there's no server-side per-request injection anymore. This
      // inline seed runs BEFORE the bundle loads, so it can't import the
      // constant -- it hardcodes store.js's BOOT_CACHE_KEY literal. The build
      // enforces the two match: build-atrium.mjs's assertBootCacheKeyInSync
      // (scripts/build-lib/bootCacheKeyGuard.mjs) aborts on any drift, so this
      // literal can't silently fall out of sync with store.js.
      var BOOT = null;
      try {
        var cached = localStorage.getItem('lvp_atrium_boot_cache_v1');
        if (cached) BOOT = JSON.parse(cached);
      } catch (e) { BOOT = null; }
      window.BOOT = BOOT;
    })();
  </script>

  <!-- Content-hashed, cache-busted; URL substituted at build time. -->
  <script src="assets/AtriumX.f625a3558f.js"></script>
</body>
</html>
